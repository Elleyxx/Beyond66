server {
    listen 80;
    server_name api.yourdomain.com;

    root /var/www/beyond66/backend/public;
    index index.php;

    access_log /var/log/nginx/beyond66-api.access.log;
    error_log /var/log/nginx/beyond66-api.error.log;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
